<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>
    <canvas id="particle-canvas"></canvas>

    {% include header.html %}
    <header class="post-header" style="background-image: url({{ page.image | prepend: site.baseurl }});">
      <h1 class="centered title">{{ page.title }}</h1>
    </header>
    <div class="page-content">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            {{ content }}
          </div>
        </div>
      </div>
    </div>

    {% include footer.html %}
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <script src="{{ site.baseurl }}/js/bootstrap.min.js"></script>
    <script>
(function () {
  'use strict';

  var canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  if (window.matchMedia('(hover: none)').matches) return;

  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;

  var CHARS = '01{}();=<>/*#|\\+-~$%&_@!?[]'.split('');
  var COUNT = 350;
  var MOUSE_R = 130;
  var MOUSE_S = 1.4;
  var SPRING = 0.055;
  var DAMP = 0.93;
  var COLOR = '#39d353';
  var CHAR_FONT = "16px 'Courier New',Courier,monospace";

  var mouse = { x: -9999, y: -9999 };
  var morphing = false;
  var particles = [];

  function Particle() {
    this.char = CHARS[(Math.random() * CHARS.length) | 0];
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.base = 0.45 + Math.random() * 0.3;
    this.alpha = this.base;
    this.tx = null;
    this.ty = null;
  }

  Particle.prototype.update = function () {
    if (morphing && this.tx !== null) {
      var dx = this.tx - this.x, dy = this.ty - this.y;
      this.vx += dx * SPRING;
      this.vy += dy * SPRING;
      this.alpha += (0.85 - this.alpha) * 0.05;
    } else {
      var dx2 = this.x - mouse.x, dy2 = this.y - mouse.y;
      var dsq = dx2 * dx2 + dy2 * dy2;
      if (dsq < MOUSE_R * MOUSE_R) {
        var d = Math.sqrt(dsq) || 1;
        var f = (1 - d / MOUSE_R) * MOUSE_S;
        this.vx += (dx2 / d) * f;
        this.vy += (dy2 / d) * f;
      }
      this.vx += (Math.random() - 0.5) * 0.15;
      this.vy += (Math.random() - 0.5) * 0.15;
      this.alpha += (this.base - this.alpha) * 0.03;
    }
    this.vx *= DAMP;
    this.vy *= DAMP;
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -20) this.x = W + 20;
    else if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    else if (this.y > H + 20) this.y = -20;
  };

  Particle.prototype.draw = function () {
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
    ctx.fillText(this.char, this.x, this.y);
  };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    particles = [];
    for (var i = 0; i < COUNT; i++) particles.push(new Particle());
  }

  function sample(word, shape, side) {
    var off = document.createElement('canvas');
    off.width = W; off.height = H;
    var oc = off.getContext('2d');
    var fs = Math.floor(Math.min(W * 0.1, 110));
    var y = Math.round(H * 0.4);
    oc.fillStyle = '#fff';
    oc.textBaseline = 'middle';
    oc.textAlign = 'center';

    if (shape) {
      var sx = side === 'right' ? Math.round(W * 0.62) : Math.round(W * 0.12);
      var wx = side === 'right' ? Math.round(W * 0.82) : Math.round(W * 0.32);
      oc.font = fs + "px 'Courier New',Courier,monospace";
      oc.fillText(shape, sx, y);
      oc.font = 'bold ' + fs + "px 'Courier New',Courier,monospace";
      oc.fillText(word, wx, y);
    } else {
      var cx = side === 'right' ? Math.round(W * 0.75) : Math.round(W * 0.25);
      oc.font = 'bold ' + fs + "px 'Courier New',Courier,monospace";
      oc.fillText(word, cx, y);
    }

    var data = oc.getImageData(0, 0, W, H).data;
    var pts = [];
    var step = Math.max(6, Math.floor(Math.sqrt(W * H / 10000)));

    for (var y = 0; y < H; y += step) {
      for (var x = 0; x < W; x += step) {
        if (data[(y * W + x) * 4 + 3] > 100) pts.push({ x: x, y: y });
      }
    }

    for (var i = pts.length - 1; i > 0; i--) {
      var j = (Math.random() * (i + 1)) | 0;
      var tmp = pts[i]; pts[i] = pts[j]; pts[j] = tmp;
    }

    return pts;
  }

  function morph(word, shape, side) {
    var pts = sample(word, shape || null, side || 'left');
    if (!pts.length) return;
    for (var i = 0; i < particles.length; i++) {
      var pt = pts[i % pts.length];
      particles[i].tx = pt.x;
      particles[i].ty = pt.y;
    }
    morphing = true;
  }

  function unmorph() {
    morphing = false;
    for (var i = 0; i < particles.length; i++) {
      particles[i].tx = null;
      particles[i].ty = null;
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    ctx.font = CHAR_FONT;
    ctx.fillStyle = COLOR;
    for (var i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', function (e) {
    mouse.x = e.clientX; mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', function () {
    mouse.x = -9999; mouse.y = -9999;
  });

  var allParas = document.querySelectorAll('.post-content > p');

  var targets = document.querySelectorAll('[data-particle-word]');
  for (var i = 0; i < targets.length; i++) {
    (function (el) {
      var para = el.parentNode;
      while (para && para.tagName && para.tagName.toLowerCase() !== 'p') para = para.parentNode;
      var idx = para ? Array.prototype.indexOf.call(allParas, para) + 1 : 1;
      var side = (idx % 2 === 1) ? 'left' : 'right';
      el.addEventListener('mouseenter', function () {
        morph(el.dataset.particleWord, el.dataset.particleShape || null, side);
      });
      el.addEventListener('mouseleave', unmorph);
    }(targets[i]));
  }

  init();
  loop();

  // Scroll reveal + auto-morph for paragraphs
  if (allParas.length && 'IntersectionObserver' in window) {
    var revealObs = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          revealObs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    var morphObs = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        var span = entry.target.querySelector('[data-particle-word]');
        if (!span) return;
        if (entry.isIntersecting) {
          var idx = Array.prototype.indexOf.call(allParas, entry.target) + 1;
          var side = (idx % 2 === 1) ? 'left' : 'right';
          morph(span.dataset.particleWord, span.dataset.particleShape || null, side);
        } else {
          unmorph();
        }
      });
    }, { threshold: 0.4 });

    allParas.forEach(function (el) {
      revealObs.observe(el);
      morphObs.observe(el);
    });
  }
}());
    </script>
  </body>
</html>
